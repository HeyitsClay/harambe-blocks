<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Harambe Blocks</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Harambe Blocks">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        :root { --bg: #050505; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 500px; margin: 0 auto; padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem; box-sizing: border-box; transition: background 0.3s; position: relative; }
        header { flex: 0 0 15%; display: flex; justify-content: space-between; align-items: center; position: relative; gap: 0.5rem; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; pointer-events: none; }
        #game { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        footer { flex: 0 0 22%; display: flex; gap: 0.5rem; align-items: center; justify-content: center; padding-bottom: 0.5rem; position: relative; z-index: 5; }
        .score-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .label { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); }
        .slot { flex: 1; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        
        #overlay, #full-lb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); padding: 2rem; }
        #full-lb-overlay { z-index: 2000; }
        
        .btn-retry { padding: 0.8rem 2rem; background: #fff; color: #000; font-weight: 900; border-radius: 2rem; text-transform: uppercase; letter-spacing: 0.1em; transition: transform 0.2s; margin-top: 1rem; }
        .btn-retry:active { transform: scale(0.9); }
        
        input { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 0.5rem; padding: 0.8rem; color: #fff; font-weight: 900; text-align: center; width: 100%; max-width: 300px; margin: 1rem 0; outline: none; }
        input:focus { border-color: #ffd700; }
        
        .leaderboard-list { width: 100%; max-width: 300px; margin-top: 1rem; font-size: 0.8rem; overflow-y: auto; flex: 1; }
        .lb-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .lb-name { font-weight: 700; color: rgba(255,255,255,0.8); }
        .lb-score { font-weight: 900; color: #ffd700; }
        
        #lb-preview { cursor: pointer; transition: opacity 0.2s; max-width: 120px; }
        #lb-preview:active { opacity: 0.5; }
    </style>
</head>
<body>
    <div id="full-lb-overlay">
        <div class="label mb-4">Global Top 100</div>
        <div id="full-lb-content" class="leaderboard-list">Loading...</div>
        <button class="btn-retry" onclick="document.getElementById('full-lb-overlay').style.display='none'">Back to Game</button>
    </div>

    <div id="overlay">
        <div class="label mb-2 text-white/60">Session Ended</div>
        <div id="final-score" class="text-6xl font-black mb-2">0</div>
        
        <div id="submit-zone" class="w-full flex flex-col items-center border-b border-white/10 pb-6 mb-4">
            <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="12">
            <button class="btn-retry" id="btn-submit">Submit & Respawn</button>
        </div>

        <div id="lb-gameover" class="w-full max-w-[300px] flex flex-col h-1/2">
            <div class="label text-center mb-2">Global Top 10</div>
            <div id="lb-content" class="leaderboard-list"></div>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="flex-1">
                <div class="label">Score</div>
                <div id="ui-score" class="score-val">0</div>
            </div>
            
            <div id="lb-preview" class="flex flex-col items-center flex-1">
                <div class="label">Leaderboard</div>
                <div id="lb-preview-content" class="text-[0.6rem] font-bold text-center leading-tight opacity-60">Loading Top 3...</div>
            </div>

            <div class="text-right flex-1">
                <div class="label">Best</div>
                <div id="ui-best" class="text-xl font-bold opacity-40">0</div>
            </div>
        </header>
        <main id="stage"></main>
        <canvas id="game"></canvas>
        <footer>
            <div id="s0" class="slot" data-id="0"></div>
            <div id="s1" class="slot" data-id="1"></div>
            <div id="s2" class="slot" data-id="2"></div>
        </footer>
    </div>

    <script>
        const TICK_RATE = 60;
        const DT = 1 / TICK_RATE;
        const EASE_CUBIC_OUT = t => 1 - Math.pow(1 - t, 3);
        const LERP = (a, b, t) => a + (b - a) * t;

        const COLORS = { BRONZE: '#cd7f32', SILVER: '#c0c0c0', GOLD: '#ffd700' };
        
        const LB_CONFIG = {
            PUBLIC: '67cb2bf98f40bb8380db69ba',
            PRIVATE: 'dgRIA9HWQEW-dm4y_bvFqQRQPTXQ1JMEK8NZG4m2nQhQ' 
        };

        class SoundFX {
            constructor() { this.ctx = null; this.master = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.connect(this.ctx.destination);
                this.master.gain.value = 0.3;
            }
            resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
            play(type, params = {}) {
                this.init(); this.resume();
                const now = this.ctx.currentTime;
                
                if (type === 'pickup') {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.master);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'place') {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.master);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(220, now); osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'clear') {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.master);
                    const lines = params.lines || 1;
                    osc.type = 'square'; osc.frequency.setValueAtTime(261.63 * Math.pow(1.2, lines), now); osc.frequency.exponentialRampToValueAtTime(523.25 * Math.pow(1.2, lines), now + 0.2);
                    gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'combo') {
                    const m = params.multiplier || 2;
                    const base = 220 * Math.pow(1.059, Math.min(24, (m - 2) * 3));
                    for(let i=0; i<3; i++) {
                        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                        o.type = 'sine'; const harmonic = [1, 2.01, 3.02][i];
                        o.frequency.setValueAtTime(base * harmonic, now);
                        o.frequency.exponentialRampToValueAtTime(base * harmonic * 1.5, now + 0.4);
                        g.gain.setValueAtTime(0.2 / (i+1), now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                        o.connect(g); g.connect(this.master); o.start(now); o.stop(now + 0.5);
                    }
                    const sparkle = this.ctx.createOscillator(); const sGain = this.ctx.createGain();
                    sparkle.type = 'triangle'; sparkle.frequency.setValueAtTime(base * 8, now); sparkle.frequency.exponentialRampToValueAtTime(base * 16, now + 0.3);
                    sGain.gain.setValueAtTime(0.05, now); sGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    sparkle.connect(sGain); sGain.connect(this.master); sparkle.start(now); sparkle.stop(now + 0.3);
                } else if (type === 'pop') {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.master);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600 + Math.random() * 400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'gameOver') {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.master);
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.8);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.start(now); osc.stop(now + 1.0);
                }
            }
        }

        const SFX = new SoundFX();

        const CONFIG = {
            GRID: 8, GAP: 6, TOUCH_OFFSET: 140, GRAVITY: 700, AUTO_DELAY: 750,
            SHAPES: {
                EASY: { dot: [[0,0]], I2h: [[0,0],[1,0]], I2v: [[0,0],[0,1]], I3h: [[0,0],[1,0],[2,0]], I3v: [[0,0],[0,1],[0,2]], L2: [[0,0],[0,1],[1,1]], O: [[0,0],[1,0],[0,1],[1,1]] },
                MEDIUM: { L3: [[0,0],[0,1],[0,2],[1,2]], J3: [[1,0],[1,1],[1,2],[0,2]], T4: [[0,0],[1,0],[2,0],[1,1]], L4: [[0,0],[1,0],[0,1],[0,2]], J4: [[0,0],[1,0],[1,1],[1,2]], I4h: [[0,0],[1,0],[2,0],[3,0]], I4v: [[0,0],[0,1],[0,2],[0,3]], S4: [[1,0],[2,0],[0,1],[1,1]], Z4: [[0,0],[1,0],[1,1],[2,1]] },
                HARD: { I5h: [[0,0],[1,0],[2,0],[3,0],[4,0]], I5v: [[0,0],[0,1],[0,2],[0,3],[0,4]], plus: [[1,0],[0,1],[1,1],[2,1],[1,2]], U5: [[0,0],[2,0],[0,1],[1,1],[2,1]], bigL: [[0,0],[0,1],[0,2],[1,2],[2,2]], chunky: [[0,0],[1,0],[1,1],[2,1],[2,2]] }
            }
        };

        const ALL_SHAPES = { ...CONFIG.SHAPES.EASY, ...CONFIG.SHAPES.MEDIUM, ...CONFIG.SHAPES.HARD };

        class Shard {
            constructor(x, y, size, bounds, color = '#fff') {
                this.x = x; this.y = y; this.size = size; this.bounds = bounds;
                this.vx = (Math.random() - 0.5) * 500; this.vy = -300 - Math.random() * 500;
                this.rotation = Math.random() * Math.PI * 2; this.rotV = (Math.random() - 0.5) * 20;
                this.life = 1.0; this.isDead = false; this.color = color;
            }
            update(dt) {
                this.vy += CONFIG.GRAVITY * dt; this.x += this.vx * dt; this.y += this.vy * dt;
                this.rotation += this.rotV * dt; this.life -= dt * 0.5;
                if (this.y >= this.bounds.h - this.size) { this.y = this.bounds.h - this.size; this.vy *= -0.3; this.vx *= 0.8; }
                if (this.life <= 0) this.isDead = true;
            }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.fillStyle = this.color; ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore(); }
        }

        class VisualFlare {
            constructor(x, y, power = 1, color = '#fff') { this.x = x; this.y = y; this.radius = 0; this.maxRadius = 60 * power; this.life = 1.0; this.color = color; }
            update(dt) { this.radius += dt * 600; this.life -= dt * 5; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius); g.addColorStop(0, this.color); g.addColorStop(1, 'transparent'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class Shockwave {
            constructor(x, y, power = 1, color = '#fff') { this.x = x; this.y = y; this.radius = 0; this.maxRadius = 150 * power; this.life = 1.0; this.power = power; this.color = color; }
            update(dt) { this.radius += dt * 600; this.life -= dt * 2.5; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life * 0.6); ctx.strokeStyle = this.color; ctx.lineWidth = 6 * this.power; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
        }

        class Confetti {
            constructor(x, y, power = 1, color = null) {
                const rain = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFFFFF'];
                this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * (400 * power); this.vy = (Math.random() - 0.8) * (600 * power);
                this.color = color || rain[Math.floor(Math.random() * rain.length)]; this.life = 1.0; this.size = 3 + Math.random() * 5;
                this.rotation = Math.random() * Math.PI * 2; this.rotV = (Math.random() - 0.5) * 30;
            }
            update(dt) { this.vy += CONFIG.GRAVITY * 0.5 * dt; this.x += this.vx * dt; this.y += this.vy * dt; this.rotation += this.rotV * dt; this.life -= dt * 0.7; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.fillStyle = this.color; ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore(); }
        }

        class ScorePopup {
            constructor(x, y, val, bounds, label = null, vx = null, vy = null) {
                this.x = x; this.y = y; this.val = val; this.label = label; this.bounds = bounds; this.isDead = false;
                this.vx = vx !== null ? vx : (Math.random() - 0.5) * 200; this.vy = vy !== null ? vy : -450 - Math.random() * 200; 
                this.rotation = 0; this.rotV = (Math.random() - 0.5) * 8;
                this.radius = typeof val === 'number' ? Math.max(18, Math.min(55, 14 + (val / 18))) : 40;
                this.pulse = 0; this.bounciness = 0.7; this.spawnScale = 0; this.targetScale = 1.0;
                this.isCombo = label && label.includes('X');
                if (typeof val === 'number') { 
                    if (val < 10) this.color = COLORS.BRONZE; 
                    else if (val < 100) this.color = COLORS.SILVER; 
                    else if (val < 125) this.color = COLORS.GOLD;
                    else this.color = '#ffd700'; 
                } else { this.color = '#ffd700'; }
            }
            update(dt, onHit) {
                this.vy += CONFIG.GRAVITY * dt; this.x += this.vx * dt; this.y += this.vy * dt;
                this.rotation += this.rotV * dt; this.pulse += dt * 10; this.vx *= 0.99; this.vy *= 0.99;
                if (this.spawnScale < this.targetScale) this.spawnScale = Math.min(this.targetScale, this.spawnScale + dt * 6);
                if (this.x <= this.radius) { this.x = this.radius; this.vx *= -this.bounciness; } else if (this.x >= this.bounds.w - this.radius) { this.x = this.bounds.w - this.radius; this.vx *= -this.bounciness; }
                if (this.y <= this.radius) { this.y = this.radius; this.vy *= -this.bounciness; }
                if (this.y >= this.bounds.h - this.radius) { this.y = this.bounds.h - this.radius; this.isDead = true; onHit(this); }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                const isRainbowTier = this.isCombo || (typeof this.val === 'number' && this.val >= 125);
                const s = this.spawnScale * (isRainbowTier || (typeof this.val === 'number' && this.val >= 100) ? (1 + Math.sin(this.pulse) * 0.1) : 1); ctx.scale(s, s);
                let fill = this.color;
                if (isRainbowTier) { fill = `hsl(${(this.pulse * 100) % 360}, 100%, 60%)`; ctx.shadowColor = fill; ctx.shadowBlur = 25; } 
                else if (typeof this.val === 'number' && this.val >= 100) { ctx.shadowColor = this.color; ctx.shadowBlur = 15; }
                ctx.fillStyle = fill; ctx.beginPath();
                if (this.isCombo) {
                    const spikes = 5; const outer = this.radius * 1.2; const inner = this.radius * 0.6;
                    let rot = Math.PI / 2 * 3; let step = Math.PI / spikes;
                    ctx.moveTo(0, -outer);
                    for (let i = 0; i < spikes; i++) {
                        ctx.lineTo(Math.cos(rot) * outer, Math.sin(rot) * outer); rot += step;
                        ctx.lineTo(Math.cos(rot) * inner, Math.sin(rot) * inner); rot += step;
                    } ctx.closePath();
                } else { ctx.arc(0, 0, this.radius, 0, Math.PI*2); }
                ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = (typeof this.val === 'number' && this.val >= 100) || this.label ? 7 : 4; ctx.stroke();
                ctx.fillStyle = '#000'; ctx.font = `900 ${Math.floor(this.radius * (this.isCombo ? 0.75 : 0.85))}px Inter`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (typeof this.val === 'number') ctx.fillText(this.val.toLocaleString(), 0, 0); else ctx.fillText(this.label, 0, 0);
                ctx.restore();
            }
        }

        class VisualTile {
            constructor(startX, startY, tx, ty, size, bounds) {
                this.x = startX; this.y = startY; this.startX = startX; this.startY = startY;
                this.tx = tx; this.ty = ty; this.size = size; this.bounds = bounds;
                this.alpha = 0; this.scaleX = 1; this.scaleY = 1; this.velScaleX = 0; this.velScaleY = 0;
                this.tension = 500; this.friction = 20; this.isDead = false; this.moveTime = 0; this.isMoving = true;
                this.isExploded = false; this.vx = 0; this.vy = 0; this.rotation = 0; this.rotV = 0;
            }
            impact() { this.scaleX = 1.4; this.scaleY = 0.6; }
            explode() { this.isExploded = true; this.isMoving = false; this.vx = (Math.random() - 0.5) * 400; this.vy = -400 - Math.random() * 400; this.rotV = (Math.random() - 0.5) * 15; }
            update(dt) {
                if (this.isExploded) {
                    this.vy += CONFIG.GRAVITY * 1.2 * dt; this.x += this.vx * dt; this.y += this.vy * dt; this.rotation += this.rotV * dt; this.alpha -= dt * 0.4;
                    if (this.y >= this.bounds.h - this.size/2) { this.y = this.bounds.h - this.size/2; this.vx *= 0.8; this.vy = 0; this.rotV *= 0.8; }
                    if (this.alpha <= 0) this.isDead = true; return;
                }
                if (this.isMoving) {
                    this.moveTime = Math.min(1, this.moveTime + dt * 6); const t = EASE_CUBIC_OUT(this.moveTime); this.x = LERP(this.startX, this.tx, t); this.y = LERP(this.startY, this.ty, t); if (this.moveTime >= 1) { this.isMoving = false; this.impact(); } }
                const ax = -this.tension * (this.scaleX - 1) - this.friction * this.velScaleX; const ay = -this.tension * (this.scaleY - 1) - this.friction * this.velScaleY;
                this.velScaleX += ax * dt; this.velScaleY += ay * dt; this.scaleX += this.velScaleX * dt; this.scaleY += this.velScaleY * dt;
                this.alpha = LERP(this.alpha, 1, 0.2);
            }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.scale(this.scaleX, this.scaleY); ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--white').trim(); ctx.beginPath(); ctx.roundRect(-this.size/2 + 1, -this.size/2 + 1, this.size - 2, this.size - 2, 10); ctx.fill(); ctx.restore(); }
        }

        class Engine {
            constructor() {
                this.canvas = document.getElementById('game'); this.ctx = this.canvas.getContext('2d');
                this.logicalGrid = Array(CONFIG.GRID).fill().map(() => Array(CONFIG.GRID).fill(null));
                this.visualEntities = []; this.popups = []; this.confetti = []; this.shockwaves = []; this.flares = []; this.shards = [];
                this.commandQueue = []; this.queue = [null, null, null];
                this.score = 0; this.best = localStorage.getItem('harambe_blocks_best_v2') || 0;
                this.drag = null; this.mouse = { x: 0, y: 0 }; this.accumulator = 0; this.lastTime = 0; this.shake = 0;
                this.liftOffset = 0; this.comboCount = 0;
                this.gridOffset = { x: 0, y: 0 };
                this.init();
            }

            init() {
                this.resize(); window.onresize = () => this.resize(); this.refill();
                const start = (e) => { SFX.init(); this.onStart(e.touches ? e.touches[0] : e); };
                const move = (e) => this.onMove(e.touches ? e.touches[0] : e);
                const end = () => this.onEnd();
                window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
                window.addEventListener('touchstart', start, {passive:false}); window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', end);
                
                const nameInput = document.getElementById('player-name');
                nameInput.value = localStorage.getItem('harambe_last_player') || '';

                document.getElementById('btn-submit').onclick = () => {
                    const name = nameInput.value.trim().toUpperCase() || 'ANONYMOUS';
                    localStorage.setItem('harambe_last_player', name);
                    this.submitScore(name, this.score);
                };

                document.getElementById('lb-preview').onclick = () => {
                    document.getElementById('full-lb-overlay').style.display = 'flex';
                    this.fetchLeaderboard(100);
                };

                this.fetchLeaderboard(3); // Initial top 3 fetch
                if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
                requestAnimationFrame(this.gameLoop.bind(this));
            }

            resize() {
                const app = document.getElementById('app'); const stage = document.getElementById('stage'); const dpr = window.devicePixelRatio || 2;
                this.canvas.width = app.clientWidth * dpr; this.canvas.height = app.clientHeight * dpr; this.ctx.scale(dpr, dpr);
                const sRect = stage.getBoundingClientRect(); const aRect = app.getBoundingClientRect();
                this.gridOffset.x = sRect.left - aRect.left; this.gridOffset.y = sRect.top - aRect.top;
                this.renderSize = Math.min(sRect.width, sRect.height) - 10; this.cSize = (this.renderSize - (CONFIG.GAP * (CONFIG.GRID + 1))) / CONFIG.GRID;
                this.gridOffset.x += (sRect.width - this.renderSize) / 2; this.gridOffset.y += (sRect.height - this.renderSize) / 2;
            }

            refill() {
                const getWeightedTier = (weights) => {
                    const total = Object.values(weights).reduce((a, b) => a + b, 0);
                    let r = Math.random() * total; for (const tier in weights) { if (r < weights[tier]) return tier; r -= weights[tier]; } return 'EASY';
                };
                const getBoardDensity = () => {
                    let occupied = 0; for (let y = 0; y < CONFIG.GRID; y++) { for (let x = 0; x < CONFIG.GRID; x++) if (this.logicalGrid[y][x]) occupied++; }
                    return occupied / (CONFIG.GRID * CONFIG.GRID);
                };
                const hasSmallGaps = () => {
                    for (let y = 0; y < CONFIG.GRID; y++) {
                        for (let x = 0; x < CONFIG.GRID; x++) {
                            if (!this.logicalGrid[y][x]) {
                                let neighbors = 0; [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                                    const nx = x+dx, ny = y+dy; if (nx<0 || nx>=CONFIG.GRID || ny<0 || ny>=CONFIG.GRID || this.logicalGrid[ny][nx]) neighbors++;
                                }); if (neighbors === 4) return true;
                            }
                        }
                    } return false;
                };
                const generateBatch = () => {
                    const density = getBoardDensity();
                    const weights = { EASY: 0.7 + (density * 0.2), MEDIUM: 0.2, HARD: 0.1 + (this.comboCount * 0.05) - (density * 0.05) };
                    if (hasSmallGaps()) weights.EASY += 0.2;
                    let batch = []; let attempts = 0;
                    while (batch.length < 3 && attempts < 100) {
                        const tier = getWeightedTier(weights); const tierShapes = Object.keys(CONFIG.SHAPES[tier]);
                        const shape = tierShapes[Math.floor(Math.random() * tierShapes.length)]; if (!batch.includes(shape)) batch.push(shape);
                        attempts++;
                    } return batch;
                };
                let validBatch = null; let rerolls = 0;
                while (!validBatch && rerolls < 100) {
                    const batch = generateBatch();
                    const allPlaceable = batch.every(type => { for (let y = 0; y < CONFIG.GRID; y++) { for (let x = 0; x < CONFIG.GRID; x++) if (this.validate(type, x, y)) return true; } return false; });
                    if (allPlaceable) validBatch = batch; rerolls++;
                }
                this.queue = validBatch || ['dot', 'I2h', 'dot'];
                for(let i=0; i<3; i++) this.updateTrayUI(i); this.checkLoss();
            }

            updateTrayUI(i) {
                const el = document.getElementById('s'+i); el.innerHTML = ''; el.style.opacity = '1'; if(!this.queue[i]) return;
                const can = document.createElement('canvas'); can.width = 120; can.height = 120;
                const ctx = can.getContext('2d'); const b = this.getB(this.queue[i]);
                const scale = Math.max(b.w, b.h) > 3 ? 20 : 26;
                this.drawPiece(ctx, this.queue[i], 60, 60, scale, 1); el.appendChild(can);
            }

            onStart(e) { const el = e.target.closest('.slot'); if(el && this.queue[el.dataset.id]) { SFX.play('pickup'); this.mouse.x = e.clientX; this.mouse.y = e.clientY; this.drag = { type: this.queue[el.dataset.id], id: el.dataset.id, tx: e.clientX, ty: e.clientY }; this.liftOffset = 0; el.style.opacity = '0'; } }
            onMove(e) { this.mouse.x = e.clientX; this.mouse.y = e.clientY; }
            onEnd() { if(!this.drag) return; const r = this.canvas.getBoundingClientRect(); const fit = this.findBestFit(this.mouse.x - r.left, this.mouse.y - r.top - this.liftOffset); if(fit) { this.commandQueue.push({ type: 'PLACE', shape: this.drag.type, gx: fit.x, gy: fit.y, id: this.drag.id, startX: this.drag.tx - r.left, startY: this.drag.ty - r.top - this.liftOffset }); } else { document.getElementById('s'+this.drag.id).style.opacity = '1'; } this.drag = null; }

            findBestFit(cx, cy) {
                let best = null; let minDist = 130;
                const tgx = Math.floor((cx - this.gridOffset.x) / (this.renderSize / CONFIG.GRID));
                const tgy = Math.floor((cy - this.gridOffset.y) / (this.renderSize / CONFIG.GRID));
                for(let oy = -3; oy <= 3; oy++) {
                    for(let ox = -3; ox <= 3; ox++) {
                        const gx = tgx + ox, gy = tgy + oy;
                        if(this.validate(this.drag.type, gx, gy)) {
                            const center = this.getPieceCenter(this.drag.type, gx, gy); const d = Math.sqrt((cx - center.x)**2 + (cy - center.y)**2);
                            if(d < minDist) { minDist = d; best = { x: gx, y: gy }; }
                        }
                    }
                } return best;
            }

            getPieceCenter(type, gx, gy) { const b = this.getB(type); return { x: this.gridOffset.x + CONFIG.GAP + (gx + b.w/2) * (this.cSize + CONFIG.GAP), y: this.gridOffset.y + CONFIG.GAP + (gy + b.h/2) * (this.cSize + CONFIG.GAP) }; }
            validate(type, gx, gy) { const s = ALL_SHAPES[type]; if (!s) return false; return s.every(([px, py]) => { const tx = gx+px, ty = gy+py; return tx>=0 && tx<CONFIG.GRID && ty>=0 && ty<CONFIG.GRID && !this.logicalGrid[ty][tx]; }); }

            checkLoss() {
                const tray = this.queue.filter(p => p !== null); if (tray.length === 0) return;
                const possible = tray.some(type => { for(let y=0; y<CONFIG.GRID; y++) { for(let x=0; x<CONFIG.GRID; x++) if(this.validate(type, x, y)) return true; } return false; });
                if(!possible) { 
                    SFX.play('gameOver'); this.visualEntities.forEach(e => { if(!e.isExploded) e.explode(); }); 
                    document.getElementById('final-score').textContent = this.score.toLocaleString(); 
                    this.fetchLeaderboard(10);
                    setTimeout(() => { document.getElementById('overlay').style.display = 'flex'; }, 1500); 
                }
            }

            async submitScore(name, score) {
                try { await fetch(`https://www.dreamlo.com/lb/${LB_CONFIG.PRIVATE}/add/${encodeURIComponent(name)}/${score}`); location.reload(); } catch (e) { location.reload(); }
            }

            async fetchLeaderboard(limit = 10) {
                try {
                    const res = await fetch(`https://www.dreamlo.com/lb/${LB_CONFIG.PUBLIC}/json`);
                    const data = await res.json();
                    let list = data.dreamlo.leaderboard.entry;
                    if (!list) return;
                    if (!Array.isArray(list)) list = [list];
                    
                    let html = '';
                    list.slice(0, limit).forEach((e, i) => {
                        html += `<div class="lb-row"><span class="lb-name">#${i+1} ${e.name}</span><span class="lb-score">${parseInt(e.score).toLocaleString()}</span></div>`;
                    });

                    if (limit === 3) document.getElementById('lb-preview-content').innerHTML = html || 'None';
                    else if (limit === 10) document.getElementById('lb-content').innerHTML = html || 'No scores yet!';
                    else if (limit === 100) document.getElementById('full-lb-content').innerHTML = html || 'No scores yet!';
                } catch (e) {}
            }

            executePlace(cmd) {
                SFX.play('place'); const shape = ALL_SHAPES[cmd.shape]; const piecePoints = shape.length;
                shape.forEach(([px, py]) => { this.logicalGrid[cmd.gy+py][cmd.gx+px] = true; const tx = this.gridOffset.x + CONFIG.GAP + (cmd.gx+px) * (this.cSize + CONFIG.GAP) + this.cSize/2; const ty = this.gridOffset.y + CONFIG.GAP + (cmd.gy+py) * (this.cSize + CONFIG.GAP) + this.cSize/2; this.visualEntities.push(new VisualTile(cmd.startX, cmd.startY, tx, ty, this.cSize, {w: this.canvas.width / (window.devicePixelRatio || 2), h: this.canvas.height / (window.devicePixelRatio || 2)})); });
                
                let r=[], c=[];
                for(let y=0; y<CONFIG.GRID; y++) if(this.logicalGrid[y].every(x=>x)) r.push(y);
                for(let x=0; x<CONFIG.GRID; x++) { let f=true; for(let y=0; y<CONFIG.GRID; y++) if(!this.logicalGrid[y][x]) f=false; if(f) c.push(x); }
                const lineCount = r.length + c.length;
                
                if (lineCount > 0) this.comboCount++; else this.comboCount = 0;
                const multiplier = Math.max(1, this.comboCount);
                let lineBonus = 0;
                if (lineCount === 1) lineBonus = 50; else if (lineCount === 2) lineBonus = 75; else if (lineCount === 3) lineBonus = 125; else if (lineCount === 4) lineBonus = 175; else if (lineCount >= 5) lineBonus = 250;
                
                const moveScore = (piecePoints + lineBonus) * multiplier; this.score += moveScore;
                const bounds = {w: this.canvas.width / (window.devicePixelRatio || 2), h: this.canvas.height / (window.devicePixelRatio || 2)};
                const center = this.getPieceCenter(cmd.shape, cmd.gx, cmd.gy);

                this.popups.push(new ScorePopup(center.x, center.y, piecePoints * multiplier, bounds));
                if (lineCount > 0) {
                    if (multiplier > 1) {
                        SFX.play('combo', { multiplier });
                        shape.forEach(([px, py]) => {
                            const tx = this.gridOffset.x + CONFIG.GAP + (cmd.gx+px) * (this.cSize + CONFIG.GAP) + this.cSize/2; 
                            const ty = this.gridOffset.y + CONFIG.GAP + (cmd.gy+py) * (this.cSize + CONFIG.GAP) + this.cSize/2; 
                            const p = new ScorePopup(tx, ty, null, bounds, `${multiplier}X`, (Math.random()-0.5)*600, -400-Math.random()*400);
                            p.radius = 45; this.popups.push(p);
                        });
                    }
                    setTimeout(() => { this.popups.push(new ScorePopup(center.x, center.y, lineBonus * multiplier, bounds)); }, 250);
                }

                r.forEach(y => { for(let x=0; x<CONFIG.GRID; x++) { this.logicalGrid[y][x] = null; this.killVisual(x, y); }});
                c.forEach(x => { for(let y=0; y<CONFIG.GRID; y++) { if(this.logicalGrid[y][x]) { this.killVisual(x, y); this.logicalGrid[y][x] = null; } }});
                
                if(lineCount > 0) {
                    SFX.play('clear', { lines: lineCount });
                    this.flares.push(new VisualFlare(this.gridOffset.x + this.renderSize/2, this.gridOffset.y + this.renderSize/2, 2.5, '#fff'));
                }
                this.queue[cmd.id] = null; this.updateTrayUI(cmd.id);
                if(this.queue.every(q => !q)) this.refill(); else this.checkLoss();
                this.updateUI();
            }

            killVisual(gx, gy) {
                const tx = this.gridOffset.x + CONFIG.GAP + gx * (this.cSize + CONFIG.GAP) + this.cSize/2;
                const ty = this.gridOffset.y + CONFIG.GAP + gy * (this.cSize + CONFIG.GAP) + this.cSize/2;
                const shardColor = getComputedStyle(document.documentElement).getPropertyValue('--white').trim();
                this.visualEntities.forEach(e => {
                    if(!e.isExploded && Math.abs(e.tx - tx) < 1 && Math.abs(e.ty - ty) < 1) {
                        e.isDead = true; const shardSize = this.cSize / 3;
                        for (let sy = 0; sy < 3; sy++) { for (let sx = 0; sx < 3; sx++) { const shardX = (tx - this.cSize/2) + sx * shardSize + shardSize/2; const shardY = (ty - this.cSize/2) + sy * shardSize + shardSize/2; this.shards.push(new Shard(shardX, shardY, shardSize, {w: this.canvas.width / (window.devicePixelRatio || 2), h: this.canvas.height / (window.devicePixelRatio || 2)}, shardColor)); } }
                    }
                });
            }

            updateUI() {
                document.getElementById('ui-score').textContent = this.score.toLocaleString(); if(this.score > this.best) { this.best = this.score; localStorage.setItem('harambe_blocks_best_v2', this.best); }
                document.getElementById('ui-best').textContent = parseInt(this.best).toLocaleString();
            }
            gameLoop(time) { const delta = (time - this.lastTime) / 1000; this.lastTime = time; this.accumulator += Math.min(delta, 0.25); while(this.accumulator >= DT) { this.update(DT); this.accumulator -= DT; } this.render(); requestAnimationFrame(this.gameLoop.bind(this)); }

            update(dt) {
                while(this.commandQueue.length > 0) { const cmd = this.commandQueue.shift(); if(cmd.type === 'PLACE') this.executePlace(cmd); }
                this.visualEntities.forEach(e => e.update(dt)); this.visualEntities = this.visualEntities.filter(e => !e.isDead);
                this.popups.forEach(p => p.update(dt, (parent) => this.handleBadgeExplode(parent))); this.popups = this.popups.filter(p => !p.isDead);
                this.confetti.forEach(c => c.update(dt)); this.confetti = this.confetti.filter(c => c.life > 0);
                this.shockwaves.forEach(s => s.update(dt)); this.shockwaves = this.shockwaves.filter(s => s.life > 0);
                this.flares.forEach(f => f.update(dt)); this.flares = this.flares.filter(f => f.life > 0);
                this.shards.forEach(s => s.update(dt)); this.shards = this.shards.filter(s => !s.isDead);
                if(this.shake > 0) this.shake *= 0.9; if (this.drag) this.liftOffset = LERP(this.liftOffset, CONFIG.TOUCH_OFFSET, 0.2); else this.liftOffset = 0;
            }

            handleBadgeExplode(p) {
                SFX.play('pop'); let power = typeof p.val === 'number' && p.val >= 125 ? 4 : (typeof p.val === 'number' && p.val >= 100 ? 2.5 : 1);
                if (p.isCombo) power = 5; this.shake = 5 * power; 
                let count = typeof p.val === 'number' && p.val >= 125 ? 150 : (typeof p.val === 'number' && p.val >= 100 ? 80 : 30);
                if (p.isCombo) count = 200;
                const isPremium = p.isCombo || (typeof p.val === 'number' && p.val >= 125);
                for(let i=0; i<count; i++) this.confetti.push(new Confetti(p.x, p.y, power, isPremium ? null : p.color));
                if (p.isCombo) { for (let i = 0; i < 3; i++) { setTimeout(() => { this.shockwaves.push(new Shockwave(p.x, p.y, power * (1 - i*0.2), `hsl(${Math.random()*360}, 100%, 70%)`)); }, i * 100); } }
                else { this.shockwaves.push(new Shockwave(p.x, p.y, power, isPremium ? `hsl(${Math.random()*360}, 100%, 70%)` : p.color)); }
                if (typeof p.val === 'number' && p.val >= 100) {
                    const newVal = p.val / 2; for (let i = 0; i < 2; i++) {
                        const angle = -Math.PI/2 + (Math.random() - 0.5) * 1.5; const force = 400 + Math.random() * 200;
                        this.popups.push(new ScorePopup(p.x, p.y - 10, newVal, {w: this.canvas.width / (window.devicePixelRatio || 2), h: this.canvas.height / (window.devicePixelRatio || 2)}, null, Math.cos(angle) * force, Math.sin(angle) * force));
                    }
                }
            }

            render() {
                const ctx = this.ctx; ctx.clearRect(0, 0, this.canvas.width / (window.devicePixelRatio || 2), this.canvas.height / (window.devicePixelRatio || 2));
                ctx.save(); if(this.shake > 0) ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
                for(let y=0; y<CONFIG.GRID; y++) {
                    for(let x=0; x<CONFIG.GRID; x++) {
                        ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.beginPath(); ctx.roundRect(this.gridOffset.x + CONFIG.GAP + x*(this.cSize+CONFIG.GAP), this.gridOffset.y + CONFIG.GAP + y*(this.cSize+CONFIG.GAP), this.cSize, this.cSize, 10); ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1; ctx.stroke();
                    }
                }
                this.visualEntities.forEach(e => e.draw(ctx)); this.shards.forEach(s => s.draw(ctx)); this.shockwaves.forEach(s => s.draw(ctx)); this.flares.forEach(f => f.draw(ctx));
                if(this.drag) {
                    this.drag.tx = LERP(this.drag.tx, this.mouse.x, 0.2); this.drag.ty = LERP(this.drag.ty, this.mouse.y, 0.2);
                    const r = this.canvas.getBoundingClientRect(); let cx = this.drag.tx - r.left, cy = this.drag.ty - r.top - this.liftOffset;
                    const fit = this.findBestFit(cx, cy); if(fit) {
                        const center = this.getPieceCenter(this.drag.type, fit.x, fit.y); cx = LERP(center.x, center.x, 0.6); cy = LERP(center.y, center.y, 0.6);
                        ctx.fillStyle = 'rgba(255,255,255,0.12)'; ALL_SHAPES[this.drag.type].forEach(([px, py]) => { ctx.beginPath(); ctx.roundRect(this.gridOffset.x + CONFIG.GAP + (fit.x+px)*(this.cSize+CONFIG.GAP), this.gridOffset.y + CONFIG.GAP + (fit.y+py)*(this.cSize+CONFIG.GAP), this.cSize, this.cSize, 10); ctx.fill(); });
                    } this.drawPiece(ctx, this.drag.type, cx, cy, this.cSize * 1.1, 1);
                }
                this.popups.forEach(p => p.draw(ctx)); this.confetti.forEach(c => c.draw(ctx)); ctx.restore();
            }

            drawPiece(ctx, type, x, y, size, alpha) {
                ctx.save(); ctx.globalAlpha = alpha; const s = ALL_SHAPES[type]; const b = this.getB(type); ctx.translate(x - (b.w)*size/2, y - (b.h)*size/2);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--white').trim();
                s.forEach(([px, py]) => { ctx.beginPath(); ctx.roundRect(px*size + 1, py*size + 1, size - 2, size - 2, 10); ctx.fill(); }); ctx.restore();
            }
            getB(t) { const s = ALL_SHAPES[t]; if (!s) return { w: 1, h: 1 }; const maxX = Math.max(...s.map(i=>i[0])), maxY = Math.max(...s.map(i=>i[1])); return { w: maxX + 1, h: maxY + 1 }; }
        }
        window.onload = () => new Engine();
    </script>
</body>
